<!DOCTYPE html>
<html lang="ja">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

            width: 16px;
            height: 16px;
            border-radius: 50%;

    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- ヘッダー領域 -->

            </div>
        </header>

        <!-- エディタ領域 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
                
                <!-- 左側: 小節数スライダー -->

                    <div class="px-2">
                        <input

                        />
                        <div class="flex justify-between text-xs text-gray-400 mt-2">

                        </div>
                    </div>
                </div>

                <!-- 右側: プリセット -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Preset Progressions</label>
                    <div class="flex flex-wrap gap-2 mb-2">
                        <button id="btnPreset251" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm rounded-md transition-colors">2-5-1 (4 bars)</button>
                        <button id="btnPresetBlues" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm rounded-md transition-colors">Jazz Blues (12 bars)</button>
                        <button id="btnPresetAutumn" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm rounded-md transition-colors">Autumn Leaves (8 bars)</button>

                    <button id="btnOpenModal" class="w-full py-2 bg-blue-50 text-blue-600 font-medium text-sm rounded-md border border-blue-200 hover:bg-blue-100 flex justify-center items-center gap-2">
                        <i data-lucide="music" class="w-4 h-4"></i> Select from Standard Songs

                </div>
            </div>

            <!-- コード進行グリッド -->

                <label class="block text-sm font-bold text-gray-700 mb-1">Chord Progression</label>
                <p class="text-xs text-gray-500 mb-3">※ To enter two chords in a measure, separate them with a space like "Dm7 G7".</p>
                
                <div id="chordGrid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-2">
                    <!-- JSで動的に生成 -->
                </div>
            </div>

            <!-- モード切り替えボタン -->

        const parseChord = (chordStr) => {
            if (!chordStr || chordStr.trim() === '') return null;
            const match = chordStr.trim().match(/^([A-G][#b]?)(.*)$/);
            if (!match) return { root: 'C', type: 'maj', notes: ['C4', 'E4', 'G4'], rootMidi: 36, intervals: [0, 4, 7] };
            
            const root = match[1];
            let type = match[2];
            if (type === '') type = 'maj';

            const rootMidi = Tone.Frequency(`${root}2`).toMidi();
            const chordRootMidi = Tone.Frequency(`${root}4`).toMidi();
            let intervals = [0, 4, 7];
            if (type.includes('m7b5') || type.includes('dim') || type.includes('h')) intervals = [0, 3, 6, 10];
            else if (type.includes('m')) intervals = [0, 3, 7, 10];
            else if (type.includes('maj7') || type.includes('M7')) intervals = [0, 4, 7, 11];
            else if (type.includes('7')) intervals = [0, 4, 7, 10];
            
            const notes = intervals.map(interval => Tone.Frequency(chordRootMidi + interval, "midi").toNote());
            return { name: chordStr, root, type, notes, rootMidi, intervals };
        };

                            // 【追加】Jamerson 風: 裏拍アプローチの半小節
                            [ {t:0, d:'8n', n:r, ty:'normal'}, {t:2, d:'16n', n:r+7, ty:'normal'}, {t:3, d:'16n', n:r+12, ty:'normal'}, {t:4, d:'8n', n:r+seventh, ty:'normal'}, {t:6, d:'16n', n:r, ty:'ghost'}, {t:7, d:'16n', n:r-1, ty:'normal'} ],
                            // 【追加】Rocco 風: 休符なしゴースト多めの半小節
                            [ {t:0, d:'16n', n:r, ty:'normal'}, {t:1, d:'16n', n:r, ty:'ghost'}, {t:2, d:'16n', n:r+7, ty:'normal'}, {t:3, d:'16n', n:r, ty:'ghost'}, {t:4, d:'16n', n:r+12, ty:'normal'}, {t:5, d:'16n', n:r, ty:'ghost'}, {t:6, d:'16n', n:r+seventh, ty:'normal'}, {t:7, d:'16n', n:r, ty:'ghost'} ],
                            // 【追加】Come On 風: 怒涛の16分上昇ラン半小節
                            [ {t:0, d:'16n', n:r, ty:'normal'}, {t:1, d:'16n', n:r-(12-seventh), ty:'normal'}, {t:2, d:'16n', n:r, ty:'normal'}, {t:3, d:'16n', n:r+3, ty:'normal'}, {t:4, d:'16n', n:r+4, ty:'normal'}, {t:5, d:'16n', n:r+7, ty:'normal'}, {t:6, d:'16n', n:r+seventh, ty:'normal'}, {t:7, d:'16n', n:r+12, ty:'normal'} ]
                        ];
                        
                        // 基本パターンを確率的に増やしてバランスを取る
                        const extendedHalfPatterns = [
                            halfPatterns[0], halfPatterns[0], halfPatterns[0],
                            halfPatterns[1], halfPatterns[1], halfPatterns[1],
                            halfPatterns[2], halfPatterns[3],
                            halfPatterns[4], halfPatterns[5], halfPatterns[6]
                        ];

                        const p = extendedHalfPatterns[Math.floor(Math.random() * extendedHalfPatterns.length)];
                        p.forEach(note => {
                            const absoluteStep = baseStep + note.t;
                            const beat = Math.floor(absoluteStep / 4);
                            const sixteenth = absoluteStep % 4;
                            measureNotes.push({ note: Tone.Frequency(note.n, "midi").toNote(), duration: note.d, time: `${mIndex}:${beat}:${sixteenth}`, type: note.ty, step: absoluteStep });
                        });
                    });
                }
                line.push({ chords: chordsInMeasure, notes: measureNotes });
            });
            return line;
        };

        const toAbcNote = (toneNote, measureAccidentals) => {
            const enharmonics = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };
            let normalizedNote = toneNote;
            for (const [flat, sharp] of Object.entries(enharmonics)) {
                if (toneNote.startsWith(flat)) {
                    normalizedNote = sharp + toneNote.slice(2);
                    break;
                }
            }

            const match = normalizedNote.match(/^([A-G])([#]?)([0-9])$/);
            if (!match) return 'z';
            let [_, noteName, acc, octave] = match;
            
            let abcAcc = '';
            if (acc === '#') {
                if (measureAccidentals[noteName] !== '^') { abcAcc = '^'; measureAccidentals[noteName] = '^'; }
            } else {
                if (measureAccidentals[noteName] === '^') { abcAcc = '='; measureAccidentals[noteName] = '='; }
            }
            
            let abcNote = noteName;
            const oct = parseInt(octave, 10);
            if (oct === 1) abcNote = noteName + ",,";
            else if (oct === 2) abcNote = noteName + ",";
            else if (oct === 3) abcNote = noteName;
            else if (oct === 4) abcNote = noteName.toLowerCase();
            
            return abcAcc + abcNote;
        };

        const generateAbcString = (bassline, style) => {
            let abc = `X:1\nT:Bassline Etude\nM:4/4\nK:C\nL:1/16\nV:1 clef=bass\n%%stretchlast 1\n`;
            
            bassline.forEach((measure, mIndex) => {
                let chordDisplay = measure.chords.map(c => c.name).join(' ');
                let measureAbc = `"${chordDisplay}" `;
                let measureAccidentals = {};
                
                let measureAbcStr = "";
                for (let beat = 0; beat < 4; beat++) {
                    let beatAbc = "";
                    let s = 0;
                    while (s < 4) {
                        let absoluteStep = beat * 4 + s;
                        const note = measure.notes.find(n => n.step === absoluteStep);
                        if (note) {
                            let len = note.duration === '16n' ? 1 : note.duration === '8n' ? 2 : note.duration === '4n' ? 4 : 1;
                            if (s + len > 4) len = 4 - s; 
                            
                            const abcNote = toAbcNote(note.note, measureAccidentals);
                            const prefix = note.type === 'ghost' ? '!style=x!' : '';
                            beatAbc += `${prefix}${abcNote}${len > 1 ? len : ''}`;
                            s += len;
                        } else {
                            let restLen = 1;
                            while(s + restLen < 4 && !measure.notes.find(n => n.step === absoluteStep + restLen)) {
                                restLen++;
                            }
                            beatAbc += `z${restLen > 1 ? restLen : ''}`;
                            s += restLen;
                        }
                    }
                    measureAbcStr += beatAbc + " ";
                }
                measureAbc += measureAbcStr;
                abc += measureAbc + "| ";
                
                if ((mIndex + 1) % 4 === 0 && mIndex !== bassline.length - 1) {
                    abc += "\n";
                }
            });
            return abc;
        };

        // --- State Variables ---
        let numMeasures = 4;
        let chordInputs = [...PRESETS.TWO_FIVE_ONE];
        let currentStyle = STYLES.SWING;
        let isPlaying = false;
        let bpmPercent = 100;
        const baseBpm = 120;
        let currentBpm = baseBpm;
        let bassline = [];
        let abcString = "";
        let metronomeEnabled = true;
        let isPracticeMode = false;
        let currentTime = 0;
        let isRepeat = true;
        let synthsInitialized = false;

        let synth = null;
        let ghostSynth = null;
        let drumSynth = null;
        let compSynth = null;
        let sequence = null;
        let compSequence = null;
        let drumLoop = null;
        let animationFrameId = null;

        // --- DOM Elements ---
        const numMeasuresInput = document.getElementById('numMeasuresInput');
        const numMeasuresDisplay = document.getElementById('numMeasuresDisplay');
        const chordGrid = document.getElementById('chordGrid');
        const songModal = document.getElementById('songModal');
        const songList = document.getElementById('songList');
        const sheetMusicDiv = document.getElementById('sheetMusic');
        
        const btnPlay = document.getElementById('btnPlay');
        const btnSkipBack = document.getElementById('btnSkipBack');
        const btnRepeat = document.getElementById('btnRepeat');
        const btnMetronome = document.getElementById('btnMetronome');
        const bpmInput = document.getElementById('bpmInput');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const practiceModeCheckbox = document.getElementById('practiceModeCheckbox');

        // --- Init Functions ---
        function init() {
            lucide.createIcons();
            renderChordGrid();
            renderSongModal();
            handleGenerate();
            setupEventListeners();
        }

        function setupSynths() {
            if (synthsInitialized) return;
            synth = new Tone.MonoSynth({
                oscillator: { type: "triangle" },
                envelope: { attack: 0.02, decay: 0.3, sustain: 0.4, release: 0.1 },
                filter: { Q: 1, type: "lowpass", rolloff: -24 },
                filterEnvelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.1, baseFrequency: 150, octaves: 2.5 }
            }).toDestination();
            synth.volume.value = -2;

            ghostSynth = new Tone.MonoSynth({
                oscillator: { type: "sine" },
                envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 },
                filter: { type: "lowpass", frequency: 300 }
            }).toDestination();
            ghostSynth.volume.value = -10;

            drumSynth = new Tone.MembraneSynth({
                pitchDecay: 0.01, octaves: 1, oscillator: { type: "square" },
                envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 }
            }).toDestination();
            drumSynth.volume.value = -15;
            
            compSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.05, decay: 0.5, sustain: 0.5, release: 0.8 }
            }).toDestination();
            // 伴奏の音量を約20%（-3dB）下げました
            compSynth.volume.value = -15; 

            Tone.Transport.bpm.value = currentBpm;
            synthsInitialized = true;
        }

        function renderChordGrid() {
            chordGrid.innerHTML = '';
            chordInputs.forEach((chord, idx) => {
                const div = document.createElement('div');
                div.className = 'flex flex-col';
                div.innerHTML = `
                    <span class="text-[10px] text-gray-400 ml-1 mb-0.5">${idx + 1}</span>
                    <input type="text" value="${chord}" data-index="${idx}" class="chord-input w-full px-2 py-2 border border-gray-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Cmaj7">
                `;
                chordGrid.appendChild(div);
            });
            
            document.querySelectorAll('.chord-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.getAttribute('data-index'));
                    chordInputs[idx] = e.target.value;
                });
            });
        }

        function renderSongModal() {
            songList.innerHTML = '';
            STANDARD_SONGS.forEach(song => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-4 py-3 hover:bg-blue-50 rounded-lg transition-colors border-b last:border-b-0 border-gray-100 flex flex-col gap-1 group';
                btn.innerHTML = `<span class="font-medium text-gray-800 group-hover:text-blue-700">${song.title}</span>`;
                btn.addEventListener('click', () => {
                    handlePreset(song.chords);
                    songModal.classList.add('hidden');
                });
                songList.appendChild(btn);
            });
        }

        function handlePreset(presetArray) {
            numMeasures = presetArray.length;
            numMeasuresInput.value = numMeasures;
            numMeasuresDisplay.innerText = numMeasures;
            chordInputs = [...presetArray];
            renderChordGrid();
        }

        function renderABC() {
            if (abcString) {
                ABCJS.renderAbc('sheetMusic', abcString, {
                    responsive: "resize",
                    add_classes: true,
                    format: { font: "sans-serif" }
                });
            }
        }

        function stopPlaybackForRegen() {
            if (sequence) { sequence.dispose(); sequence = null; }
            if (compSequence) { compSequence.dispose(); compSequence = null; }
            if (drumLoop) { drumLoop.dispose(); drumLoop = null; }
            Tone.Transport.position = 0;
            currentTime = 0;
            updateTimeDisplay();
            
            if (isPlaying) {
                Tone.Transport.pause();
                isPlaying = false;
                if (synth) synth.triggerRelease();
                if (ghostSynth) ghostSynth.triggerRelease();
                if (compSynth) compSynth.releaseAll();
                updatePlayBtnUI();
            }
        }

        function handleGenerate() {
            const parsedMeasures = chordInputs.map(input => {
                const parts = input.split(/\s+/).filter(p => p.trim() !== '');
                if (parts.length === 0) return [parseChord('Cmaj7')];
                return parts.map(parseChord).filter(Boolean);
            });

            if (currentStyle === STYLES.SWING) {
                bassline = generateSwingLine(parsedMeasures);
            } else {
                bassline = generateFunkLine(parsedMeasures);
            }
            
            abcString = generateAbcString(bassline, currentStyle);
            renderABC();
            stopPlaybackForRegen();
        }

        function handleStyleChange(style) {
            currentStyle = style;
            const btnSwing = document.getElementById('btnSwing');
            const btnFunk = document.getElementById('btnFunk');
            if (style === STYLES.SWING) {
                btnSwing.className = 'px-8 py-2 font-bold text-sm rounded-md transition-all bg-white text-blue-600 shadow-sm';
                btnFunk.className = 'px-8 py-2 font-bold text-sm rounded-md transition-all text-gray-500 hover:text-gray-700';
            } else {
                btnFunk.className = 'px-8 py-2 font-bold text-sm rounded-md transition-all bg-white text-blue-600 shadow-sm';
                btnSwing.className = 'px-8 py-2 font-bold text-sm rounded-md transition-all text-gray-500 hover:text-gray-700';
            }
            handleGenerate();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            timeDisplay.innerText = formatTime(currentTime);
        }

        function updatePlayBtnUI() {
            btnPlay.innerHTML = isPlaying ? `<i data-lucide="pause" class="w-5 h-5 fill-current"></i>` : `<i data-lucide="play" class="w-5 h-5 fill-current"></i>`;
            lucide.createIcons();
        }

        function updateTimeLoop() {
            if (Tone.Transport.state === "started") {
                currentTime = Tone.Transport.seconds;
                updateTimeDisplay();
                animationFrameId = requestAnimationFrame(updateTimeLoop);
            }
        }

        async function togglePlay() {
            setupSynths();
            if (isPlaying) {
                Tone.Transport.pause();
                isPlaying = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                if (synth) synth.triggerRelease();
                if (ghostSynth) ghostSynth.triggerRelease();
                if (compSynth) compSynth.releaseAll();
            } else {
                await Tone.start();
                
                const totalTime = `${bassline.length}m`; 
                const totalTimeSec = bassline.length * Tone.Time('1m').toSeconds();
                
                if (Tone.Transport.seconds >= totalTimeSec - 0.1) {
                    Tone.Transport.position = 0;
                }

                if (!sequence || sequence.state === "stopped" || sequence.progress === 0) {
                    if (sequence) sequence.dispose();
                    if (compSequence) compSequence.dispose();
                    if (drumLoop) drumLoop.dispose();

                    const flatEvents = [];
                    const compEvents = [];
                    let globalIndex = 0;
                    
                    bassline.forEach((measure, mIndex) => {
                        measure.notes.forEach((note) => {
                            let scheduledTime = note.time;
                            if (note.type === 'swing8n_back') {
                                const baseBeatTime = Tone.Time(`${mIndex}:${Math.floor(note.step / 4)}:0`).toSeconds();
                                const quarterNoteDur = Tone.Time('4n').toSeconds();
                                scheduledTime = baseBeatTime + (quarterNoteDur * (2/3));
                            } else if (note.type === 'swing8n_front') {
                                const baseBeatTime = Tone.Time(`${mIndex}:${Math.floor(note.step / 4)}:0`).toSeconds();
                                scheduledTime = baseBeatTime;
                            }
                            flatEvents.push({ time: scheduledTime, note: note.note, duration: note.duration, type: note.type, mIndex, index: globalIndex++ });
                        });
                        
                        measure.chords.forEach((chord, cIndex) => {
                            const isSingleChord = measure.chords.length === 1;
                            const timeStr = isSingleChord ? `${mIndex}:0:0` : `${mIndex}:${cIndex * 2}:0`;
                            const durStr = isSingleChord ? '1m' : '2n';
                            const duration = Tone.Time(durStr).toSeconds() - 0.05;
                            compEvents.push({ time: timeStr, notes: chord.notes, duration: duration });
                        });
                    });

                    sequence = new Tone.Part((time, event) => {
                        if (isPracticeMode) return;
                        if (event.type === 'ghost') {
                            ghostSynth.triggerAttackRelease(event.note, "32n", time);
                        } else {
                            let durationSec = Tone.Time(event.duration).toSeconds() - 0.05;
                            if (event.type === 'swing8n_front') {
                                durationSec = Tone.Time('4n').toSeconds() * (2/3) - 0.02;
                            } else if (event.type === 'swing8n_back') {
                                durationSec = Tone.Time('4n').toSeconds() * (1/3) - 0.02;
                            }
                            durationSec = Math.max(0.02, durationSec);
                            synth.triggerAttackRelease(event.note, durationSec, time);
                        }
                    }, flatEvents).start(0);

                    compSequence = new Tone.Part((time, event) => {
                        compSynth.triggerAttackRelease(event.notes, event.duration, time);
                    }, compEvents).start(0);

                    sequence.loop = isRepeat;
                    sequence.loopEnd = totalTime;
                    compSequence.loop = isRepeat;
                    compSequence.loopEnd = totalTime;

                    drumLoop = new Tone.Loop((time) => {
                        if (!metronomeEnabled) return;
                        const currentBeat = Math.floor(Tone.Transport.position.split(':')[1]);
                        const current16th = Math.floor(Tone.Transport.position.split(':')[2]);
                        
                        if (current16th === 0) {
                            if (currentBeat === 0) drumSynth.triggerAttackRelease("C4", "16n", time, 1);
                            else drumSynth.triggerAttackRelease("G3", "16n", time, 0.5);
                        }
                    }, "16n").start(0);
                }
                
                if (sequence) sequence.loop = isRepeat;
                if (compSequence) compSequence.loop = isRepeat;

                Tone.Transport.start();
                isPlaying = true;
                animationFrameId = requestAnimationFrame(updateTimeLoop);
            }
            updatePlayBtnUI();
        }

        function handleSkipBack() {
            Tone.Transport.position = 0;
            currentTime = 0;
            updateTimeDisplay();
            if (synth) synth.triggerRelease();
            if (compSynth) compSynth.releaseAll();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            numMeasuresInput.addEventListener('input', (e) => {
                numMeasures = parseInt(e.target.value);
                numMeasuresDisplay.innerText = numMeasures;
                if (chordInputs.length < numMeasures) {
                    const fill = new Array(numMeasures - chordInputs.length).fill('Cmaj7');
                    chordInputs = [...chordInputs, ...fill];
                } else {
                    chordInputs = chordInputs.slice(0, numMeasures);
                }
                renderChordGrid();
            });

            document.getElementById('btnPreset251').addEventListener('click', () => handlePreset(PRESETS.TWO_FIVE_ONE));
            document.getElementById('btnPresetBlues').addEventListener('click', () => handlePreset(PRESETS.BLUES));
            document.getElementById('btnPresetAutumn').addEventListener('click', () => handlePreset(PRESETS.AUTUMN));

            document.getElementById('btnOpenModal').addEventListener('click', () => songModal.classList.remove('hidden'));
            document.getElementById('btnCloseModal').addEventListener('click', () => songModal.classList.add('hidden'));

            document.getElementById('btnSwing').addEventListener('click', () => handleStyleChange(STYLES.SWING));
            document.getElementById('btnFunk').addEventListener('click', () => handleStyleChange(STYLES.FUNK));
            
            document.getElementById('btnGenerate').addEventListener('click', handleGenerate);

            practiceModeCheckbox.addEventListener('change', (e) => isPracticeMode = e.target.checked);

            btnRepeat.addEventListener('click', () => {
                isRepeat = !isRepeat;
                btnRepeat.className = isRepeat ? 'p-2 rounded-md transition-colors bg-white shadow-sm text-blue-600' : 'p-2 rounded-md transition-colors text-gray-500 hover:bg-gray-200';
            });

            btnSkipBack.addEventListener('click', handleSkipBack);
            btnPlay.addEventListener('click', togglePlay);

            bpmInput.addEventListener('input', (e) => {
                bpmPercent = parseInt(e.target.value);
                currentBpm = Math.round(baseBpm * (bpmPercent / 100));
                bpmDisplay.innerText = currentBpm;
                Tone.Transport.bpm.value = currentBpm;
            });

            btnMetronome.addEventListener('click', () => {
                metronomeEnabled = !metronomeEnabled;
                if (metronomeEnabled) {
                    btnMetronome.className = 'flex items-center gap-2 px-3 py-1.5 border rounded-md transition-colors text-sm font-medium bg-blue-50 border-blue-200 text-blue-700';
                    btnMetronome.innerHTML = `<i data-lucide="volume-2" class="w-4 h-4"></i> Click`;
                } else {
                    btnMetronome.className = 'flex items-center gap-2 px-3 py-1.5 border rounded-md transition-colors text-sm font-medium bg-white border-gray-300 text-gray-600';
                    btnMetronome.innerHTML = `<i data-lucide="volume-x" class="w-4 h-4"></i> Click`;
                }
                lucide.createIcons();
            });
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
